<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF8F3"/>
      <stop offset="100%" stop-color="#F0E9D8"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.85" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#B85C38" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#B85C38" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1F1A17" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- six-node constellation, scaled and translated to live in the right side -->
  <g transform="translate(720 180) scale(1.4)" stroke="#1F1A17" stroke-opacity="0.32" fill="none" stroke-width="1.2">
    <line x1="50"  y1="30"  x2="230" y2="30"/>
    <line x1="230" y1="30"  x2="320" y2="110"/>
    <line x1="320" y1="110" x2="230" y2="190"/>
    <line x1="230" y1="190" x2="50"  y2="190"/>
    <line x1="50"  y1="190" x2="-40" y2="110"/>
    <line x1="-40" y1="110" x2="50"  y2="30"/>
    <line x1="50"  y1="30"  x2="230" y2="190"/>
    <line x1="230" y1="30"  x2="50"  y2="190"/>
    <line x1="320" y1="110" x2="-40" y2="110"/>
  </g>
  <g transform="translate(720 180) scale(1.4)" fill="#B85C38">
    <circle cx="50"  cy="30"  r="7"/>
    <circle cx="230" cy="30"  r="7"/>
    <circle cx="320" cy="110" r="7"/>
    <circle cx="230" cy="190" r="7"/>
    <circle cx="50"  cy="190" r="7"/>
    <circle cx="-40" cy="110" r="7"/>
  </g>

  <!-- text block on the left -->
  <g transform="translate(80 200)" fill="#1F1A17">
    <text x="0" y="0" font-family="Georgia, 'Cardo', serif" font-size="28" fill="#6B6157" letter-spacing="3">TOMMY · DIGITAL GARDEN</text>
    <text x="0" y="100" font-family="Georgia, 'Fraunces', serif" font-size="84" font-weight="600">tommickey.cn</text>
    <text x="0" y="170" font-family="Georgia, 'Cardo', serif" font-size="34" fill="#6B6157">
      <tspan>哲学 · AI · 机器人 · 脑电 · 心理 · 科幻</tspan>
    </text>
    <text x="0" y="225" font-family="Georgia, 'Cardo', serif" font-size="26" fill="#6B6157" font-style="italic">
      Perpetually growing, never finished.
    </text>
  </g>

  <!-- bottom-left tag -->
  <g transform="translate(80 560)" fill="#5C8A6B">
    <circle cx="6" cy="-6" r="6"/>
    <text x="22" y="0" font-family="Georgia, serif" font-size="20" fill="#1F1A17" font-weight="600">tommickey.cn</text>
  </g>
</svg>
